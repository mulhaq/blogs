<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming LLM with Groq</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: #242424;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            height: 80vh;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(90deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 24px;
            border-bottom: 1px solid #3d3d3d;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 4px;
            background: linear-gradient(90deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 13px;
            color: #888;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-area::-webkit-scrollbar {
            width: 8px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        .chat-area::-webkit-scrollbar-thumb:hover {
            background: #666;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            justify-content: flex-end;
        }

        .user-message .bubble {
            background: #0066cc;
            color: #fff;
        }

        .assistant-message .bubble {
            background: #333;
            color: #e0e0e0;
            border: 1px solid #444;
        }

        .bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .loading-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            color: #888;
            font-size: 12px;
        }

        .loading-indicator .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #888;
            animation: pulse 1.4s infinite;
        }

        .loading-indicator .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-indicator .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }

        .error-message {
            background: #8b0000;
            color: #ffcccc;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            border-left: 4px solid #ff0000;
        }

        .input-area {
            background: #1a1a1a;
            border-top: 1px solid #3d3d3d;
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input[type="text"] {
            background: #333;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #0066cc;
        }

        input[type="text"]::placeholder {
            color: #666;
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-send {
            background: linear-gradient(90deg, #0066cc, #0052a3);
            color: white;
        }

        .btn-send:hover:not(:disabled) {
            background: linear-gradient(90deg, #0052a3, #003d7a);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.3);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-stop {
            background: #8b0000;
            color: white;
        }

        .btn-stop:hover {
            background: #a50000;
            transform: translateY(-1px);
        }

        .btn-stop:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            text-align: center;
        }

        .empty-state h2 {
            font-size: 20px;
            margin-bottom: 8px;
            color: #888;
        }

        .empty-state p {
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Streaming LLM</h1>
            <p>Real-time responses via Groq API</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="empty-state">
                <h2>Welcome</h2>
                <p>Ask me anything. Responses stream in real-time.</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input
                    type="text"
                    id="messageInput"
                    placeholder="Type your message here... (press Enter to send)"
                    autocomplete="off"
                />
            </div>
            <div class="button-group">
                <button id="sendBtn" class="btn-send">Send</button>
                <button id="stopBtn" class="btn-stop" disabled>Stop</button>
            </div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const stopBtn = document.getElementById('stopBtn');

        let isStreaming = false;
        let eventSource = null;

        // Auto-scroll to bottom when new messages appear
        const autoScroll = () => {
            chatArea.scrollTop = chatArea.scrollHeight;
        };

        // Send message function
        const sendMessage = async () => {
            const message = messageInput.value.trim();
            if (!message || isStreaming) return;

            // Clear input
            messageInput.value = '';
            messageInput.focus();

            // Clear empty state if present
            const emptyState = chatArea.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            // Add user message
            const userMsg = document.createElement('div');
            userMsg.className = 'message user-message';
            userMsg.innerHTML = `<div class="bubble">${escapeHtml(message)}</div>`;
            chatArea.appendChild(userMsg);
            autoScroll();

            // Add assistant message container
            const assistantMsg = document.createElement('div');
            assistantMsg.className = 'message assistant-message';
            assistantMsg.id = 'streamingMessage';
            assistantMsg.innerHTML = `<div class="bubble" id="streamingBubble"></div>`;
            chatArea.appendChild(assistantMsg);
            autoScroll();

            // Set UI state
            isStreaming = true;
            sendBtn.disabled = true;
            stopBtn.disabled = false;
            messageInput.disabled = true;

            const streamingBubble = document.getElementById('streamingBubble');
            let buffer = '';

            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message }),
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // Parse SSE stream
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    buffer += chunk;

                    // Process complete lines
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const data = line.startsWith('data: ') ? line.slice(6) : line.slice(5);

                            if (data === '[DONE]') {
                                // Stream complete
                                isStreaming = false;
                                stopBtn.disabled = true;
                                sendBtn.disabled = false;
                                messageInput.disabled = false;
                                continue;
                            }

                            try {
                                const parsed = JSON.parse(data);

                                if (parsed.error) {
                                    // Error event
                                    streamingBubble.innerHTML = `<span style="color: #ffcccc;">[Error] ${escapeHtml(parsed.error)}</span>`;
                                    isStreaming = false;
                                    stopBtn.disabled = true;
                                    sendBtn.disabled = false;
                                    messageInput.disabled = false;
                                } else if (parsed.token) {
                                    // Token event - append with typewriter effect
                                    streamingBubble.textContent += parsed.token;
                                    autoScroll();
                                }
                            } catch (e) {
                                console.error('Failed to parse SSE data:', data, e);
                            }
                        }
                    }
                }

                // Process remaining buffer
                if (buffer && buffer.startsWith('data:')) {
                            const data = buffer.startsWith('data: ') ? buffer.slice(6) : buffer.slice(5);
                    if (data !== '[DONE]') {
                        try {
                            const parsed = JSON.parse(data);
                            if (parsed.token) {
                                streamingBubble.textContent += parsed.token;
                                autoScroll();
                            }
                        } catch (e) {
                            console.error('Failed to parse final SSE data:', data, e);
                        }
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = `Error: ${error.message || 'Failed to fetch response'}`;
                chatArea.appendChild(errorDiv);
                autoScroll();

                isStreaming = false;
                stopBtn.disabled = true;
                sendBtn.disabled = false;
                messageInput.disabled = false;
            }
        };

        // Stop streaming
        const stopStreaming = () => {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            isStreaming = false;
            stopBtn.disabled = true;
            sendBtn.disabled = false;
            messageInput.disabled = false;
        };

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        stopBtn.addEventListener('click', stopStreaming);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isStreaming) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Helper: escape HTML
        const escapeHtml = (text) => {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        };

        // Focus input on load
        messageInput.focus();
    </script>
</body>
</html>
