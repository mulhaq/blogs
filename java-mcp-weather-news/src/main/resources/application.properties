# Groq API Configuration for Spring AI
# Get your free API key at https://console.groq.com
spring.ai.openai.api-key=YOUR_GROQ_API_KEY_HERE
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

# Server configuration
server.port=8080

# Ignore unknown fields in JSON responses (needed for Groq extra fields like queue_time)
spring.jackson.deserialization.fail-on-unknown-properties=false

# Logging
logging.level.root=INFO
logging.level.com.mulhaq.mcp=DEBUG
